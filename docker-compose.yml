services:
  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - contender-data:/app/data
      - whisper-cache:/root/.cache/huggingface
  admin:
    build:
      context: frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  contender-data:
  whisper-cache:
